name: CI

on:
  push:
    branches:
      - main
      - bugfix
  pull_request:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          export PYTHONPATH=$GITHUB_WORKSPACE
          python -m pytest tests -v

      - name: Build Docker image
        run: docker build -t weather-app .

      - name: Test container runs
        run: |
          docker run -d --name test-container -p 5000:5000 weather-app
          sleep 10
          docker ps
          docker stop test-container
          docker rm test-container

      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag image
        if: github.ref == 'refs/heads/main'
        run: docker tag weather-app kjhgrtyhb/weather-ml-app:latest

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: docker push kjhgrtyhb/weather-ml-app:latest
